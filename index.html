<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Game Portfolio</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar fullWidth">
      <div class="container fullWidth">
        <div class="navbar-title">SILA KOLELI</div>
        <ul class="nav-links">
          <li><a href="#home">Home</a></li>
          <li><a href="#games">Games</a></li>
          <li><a href="#about">About</a></li>
        </ul>
      </div>
    </nav>

    <section id="home" class="hero centered">
      <div class="container hero-content">
        <img src="assets/header.png" alt="Profile" class="hero-image" />
        <div class="container">
          <h1>SILA KÖLELİ</h1>
          <p>Software Developer</p>
        </div>
      </div>
    </section>

    <!-- Games Section -->
    <section id="games" class="games centered">
      <div class="container">
        <h2>My Games</h2>
        <div class="games-carousel-container">
          <button class="carousel-arrow carousel-arrow-left" id="carouselLeft">❮</button>
          <div class="games-carousel" id="gamesCarousel">
            <!-- Games will be loaded here by script.js -->
          </div>
          <button class="carousel-arrow carousel-arrow-right" id="carouselRight">❯</button>
        </div>
      </div>
    </section>

    <!-- Game Modal -->
    <div id="gameModal" class="game-modal">
      <div class="modal-content">
        <button class="modal-close">&times;</button>
        <iframe id="modalIframe" class="modal-iframe" sandbox="allow-same-origin allow-scripts allow-forms allow-popups"></iframe>
      </div>
    </div>

    <!-- About Section -->
    <section id="about" class="about"></section>

    <!-- Footer -->
    <footer class="footer"></footer>

    <script src="script.js"></script>
  </body>
</html>
